services:
    mailhog:
        image: 'mailhog/mailhog:latest'
        ports:
            - '33001:8025'

    redis:
        image: 'redis:alpine'

    mysql:
        image: 'mysql:8.0'
        working_dir: /application
        volumes:
            - '.:/application'
        environment:
            - MYSQL_ROOT_PASSWORD=@rootmf102030
            - MYSQL_DATABASE=schedule_saas
            - MYSQL_USER=laravel
            - MYSQL_PASSWORD=User@102030
        ports:
            - '33002:3306'

    webserver:
        image: 'nginx:alpine'
        working_dir: /application
        volumes:
            - '.:/application'
            - './phpdocker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf'
        ports:
            - '33000:80'
        depends_on:
            - php-fpm

    php-fpm:
        build: phpdocker/php-fpm
        working_dir: /application
        volumes:
            - '.:/application'
            - './phpdocker/php-fpm/php-ini-overrides.ini:/etc/php/8.2/fpm/conf.d/99-overrides.ini'
            - './phpdocker/php-fpm/php-ini-overrides.ini:/etc/php/8.2/cli/conf.d/99-overrides.ini'

    node:
        image: 'node:20-alpine'
        working_dir: /application
        volumes:
            - '.:/application'
            - 'node_modules:/application/node_modules'
        ports:
            - '5173:5173'
        command: sh -c "npm install && npm run dev"
        environment:
            - NODE_ENV=development

volumes:
    node_modules:
